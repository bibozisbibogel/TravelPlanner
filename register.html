<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – TravelPlanner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card" style="max-width:520px;">
      <!-- Brand -->
      <div class="text-center mb-4">
        <div class="brand-logo mb-2">
          <i class="bi bi-airplane-fill text-primary me-2"></i>TravelPlanner
        </div>
        <h5 class="fw-bold">Create a free account</h5>
        <p class="text-muted small">Start planning extraordinary adventures</p>
      </div>

      <!-- Form -->
      <form id="registerForm" novalidate onsubmit="doRegister(event)">
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="regFirst"
                   placeholder="Cristian" required />
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="regLast"
                   placeholder="Stoian" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="regEmail"
                   placeholder="email@example.com" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="regPass"
                   placeholder="Minimum 8 characters" required minlength="8"
                   oninput="checkRegPassStrength()" />
            <button type="button" class="btn btn-outline-secondary"
                    onclick="togglePass('regPass', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="progress mt-2" style="height:4px;">
            <div class="progress-bar" id="regPassBar" style="width:0%"></div>
          </div>
          <small id="regPassHint" class="text-muted">At least 8 characters, one uppercase letter and one digit</small>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="regPassConfirm"
                   placeholder="Repeat password" required />
          </div>
          <div id="passMatchMsg" class="mt-1 small d-none"></div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Country of Residence</label>
          <select class="form-select" id="regCountry">
            <option selected>Romania</option>
            <option>Germany</option>
            <option>France</option>
            <option>Italy</option>
            <option>Spain</option>
            <option>UK</option>
            <option>USA</option>
          </select>
        </div>

        <div class="mb-4">
          <div class="form-check mb-2">
            <input type="checkbox" class="form-check-input" id="agreeTerms" required />
            <label class="form-check-label small" for="agreeTerms">
              I agree to the
              <a href="#" class="text-primary">Terms and Conditions</a> and
              <a href="#" class="text-primary">Privacy Policy</a>
              <span class="text-danger">*</span>
            </label>
          </div>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="agreeNewsletter" />
            <label class="form-check-label small" for="agreeNewsletter">
              I want to receive travel offers and inspiration by email
            </label>
          </div>
        </div>

        <div id="regError" class="alert alert-danger py-2 small d-none"></div>

        <button type="submit" class="btn btn-success w-100 mb-3" id="regBtn">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>

        <div class="text-center small text-muted">
          Already have an account?
          <a href="login.html" class="text-primary fw-semibold">Log in</a>
        </div>
      </form>

      <p class="text-center mt-4 small text-muted mb-0">
        <a href="index.html" class="text-muted">
          <i class="bi bi-arrow-left me-1"></i>Back to home page
        </a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    function togglePass(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
    }

    function checkRegPassStrength() {
      const val  = document.getElementById('regPass').value;
      const bar  = document.getElementById('regPassBar');
      const hint = document.getElementById('regPassHint');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { pct:0,   cls:'bg-secondary', label:'At least 8 characters, one uppercase letter and one digit' },
        { pct:25,  cls:'bg-danger',    label:'Weak password' },
        { pct:50,  cls:'bg-warning',   label:'Medium password' },
        { pct:75,  cls:'bg-info',      label:'Good password' },
        { pct:100, cls:'bg-success',   label:'Excellent password!' }
      ];
      const lv = levels[score];
      bar.style.width = lv.pct + '%';
      bar.className   = 'progress-bar ' + lv.cls;
      hint.textContent = lv.label;
    }

    document.getElementById('regPassConfirm').addEventListener('input', function() {
      const p1  = document.getElementById('regPass').value;
      const msg = document.getElementById('passMatchMsg');
      msg.classList.remove('d-none');
      if (this.value === p1) {
        msg.innerHTML = '<i class="bi bi-check-circle text-success me-1"></i>Passwords match';
        msg.className = 'mt-1 small text-success';
      } else {
        msg.innerHTML = '<i class="bi bi-x-circle text-danger me-1"></i>Passwords do not match';
        msg.className = 'mt-1 small text-danger';
      }
    });

    function doRegister(e) {
      e.preventDefault();
      const first   = document.getElementById('regFirst').value.trim();
      const last    = document.getElementById('regLast').value.trim();
      const email   = document.getElementById('regEmail').value.trim();
      const pass    = document.getElementById('regPass').value;
      const confirm = document.getElementById('regPassConfirm').value;
      const terms   = document.getElementById('agreeTerms').checked;
      const errEl   = document.getElementById('regError');
      const btn     = document.getElementById('regBtn');

      errEl.classList.add('d-none');

      if (pass !== confirm) {
        errEl.textContent = 'Passwords do not match!';
        errEl.classList.remove('d-none');
        return;
      }
      if (!terms) {
        errEl.textContent = 'You must accept the terms and conditions.';
        errEl.classList.remove('d-none');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';

      setTimeout(() => {
        setCurrentUser({ name: first + ' ' + last, email });
        window.location.href = 'trips.html';
      }, 1200);
    }
  </script>
</body>
</html>
