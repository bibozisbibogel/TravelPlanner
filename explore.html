<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore Destinations – TravelPlanner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-airplane-fill me-2"></i>TravelPlanner
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="explore.html">Explore</a></li>
          <li class="nav-item"><a class="nav-link" href="trips.html">My Trips</a></li>
          <li class="nav-item"><a class="nav-link" href="budget.html">Budget</a></li>
        </ul>
        <div id="themeToggleWrap" class="d-flex align-items-center"></div>
        <ul class="navbar-nav" id="navUser"></ul>
      </div>
    </div>
  </nav>

  <!-- ===== PAGE HEADER ===== -->
  <div class="page-header">
    <div class="container">
      <h1><i class="bi bi-globe2 me-2"></i>Explore Destinations</h1>
      <p>Discover new places and get inspired for your next adventure</p>
    </div>
  </div>

  <main class="container pb-5">

    <!-- ===== SEARCH & FILTERS ===== -->
    <div class="bg-white rounded-3 shadow-sm p-3 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label class="form-label small text-muted fw-semibold">Search destination</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text" id="destSearch" class="form-control border-start-0"
                   placeholder="e.g. Paris, Bali, Tokyo..." oninput="filterDests()" />
          </div>
        </div>
        <div class="col-md-2">
          <label class="form-label small text-muted fw-semibold">Continent</label>
          <select id="continentFilter" class="form-select" onchange="filterDests()">
            <option value="">All</option>
            <option value="Asia">Asia</option>
            <option value="Europe">Europe</option>
            <option value="Americas">Americas</option>
            <option value="Africa">Africa</option>
            <option value="Oceania">Oceania</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label small text-muted fw-semibold">Type</label>
          <select id="typeFilter" class="form-select" onchange="filterDests()">
            <option value="">All</option>
            <option value="cultural">Cultural</option>
            <option value="beach">Beach</option>
            <option value="adventure">Adventure</option>
            <option value="city">City Break</option>
            <option value="nature">Nature</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label small text-muted fw-semibold">Budget / person</label>
          <select id="budgetFilter" class="form-select" onchange="filterDests()">
            <option value="">Any budget</option>
            <option value="budget">Budget (under $1000)</option>
            <option value="moderate">Moderate ($1000–$2500)</option>
            <option value="luxury">Luxury (over $2500)</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Category pills -->
    <div class="d-flex gap-2 flex-wrap mb-4">
      <button class="btn btn-primary btn-sm rounded-pill cat-btn active"
              onclick="setCat('', this)">All</button>
      <button class="btn btn-outline-secondary btn-sm rounded-pill cat-btn"
              onclick="setCat('cultural', this)"><i class="bi bi-bank me-1"></i>Cultural</button>
      <button class="btn btn-outline-secondary btn-sm rounded-pill cat-btn"
              onclick="setCat('beach', this)"><i class="bi bi-umbrella me-1"></i>Beach</button>
      <button class="btn btn-outline-secondary btn-sm rounded-pill cat-btn"
              onclick="setCat('adventure', this)"><i class="bi bi-lightning me-1"></i>Adventure</button>
      <button class="btn btn-outline-secondary btn-sm rounded-pill cat-btn"
              onclick="setCat('city', this)"><i class="bi bi-buildings me-1"></i>City Break</button>
      <button class="btn btn-outline-secondary btn-sm rounded-pill cat-btn"
              onclick="setCat('nature', this)"><i class="bi bi-tree me-1"></i>Nature</button>
    </div>

    <!-- Results count -->
    <p class="text-muted small mb-3" id="resultCount"></p>

    <!-- ===== DESTINATIONS GRID ===== -->
    <div class="row g-4" id="destGrid"></div>

    <!-- Empty state -->
    <div id="emptyDest" class="empty-state d-none">
      <i class="bi bi-globe"></i>
      <h4 class="fw-bold mb-2">No destinations found</h4>
      <p class="text-muted">Try different filters or search for another destination.</p>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="container text-center">
      <p class="small opacity-50 mb-0">&copy; 2026 TravelPlanner. PAW Project – University.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const DESTINATIONS = [
      { name:'Tokyo', country:'Japan', continent:'Asia', type:'cultural', budget:'moderate',
        desc:'The city of the future with ancient temples, refined gastronomy and a fascinating culture.',
        tags:['Gastronomy', 'Culture', 'Technology'], rating:4.9, price:'$2,000–$3,500',
        img:'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=400&q=80' },
      { name:'Paris', country:'France', continent:'Europe', type:'city', budget:'moderate',
        desc:'The City of Light with its iconic architecture, world-renowned museums and refined gastronomy.',
        tags:['Romantic', 'Art', 'Gastronomy'], rating:4.8, price:'$1,800–$3,000',
        img:'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=400&q=80' },
      { name:'Bali', country:'Indonesia', continent:'Asia', type:'beach', budget:'budget',
        desc:'The island of the gods with tropical beaches, rice terraces and a unique spirituality.',
        tags:['Relaxation', 'Beach', 'Spirituality'], rating:4.7, price:'$800–$1,500',
        img:'https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=400&q=80' },
      { name:'New York', country:'USA', continent:'Americas', type:'city', budget:'luxury',
        desc:'The city that never sleeps, with impressive skyscrapers and a unique energy.',
        tags:['Museums', 'Broadway', 'Shopping'], rating:4.6, price:'$3,000–$5,000',
        img:'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=400&q=80' },
      { name:'Barcelona', country:'Spain', continent:'Europe', type:'beach', budget:'moderate',
        desc:'Gaudi architecture, Mediterranean beaches and a legendary nightlife.',
        tags:['Architecture', 'Beach', 'Nightlife'], rating:4.7, price:'$1,500–$2,500',
        img:'https://images.unsplash.com/photo-1539037116277-4db20889f2d4?w=400&q=80' },
      { name:'Kenya Safari', country:'Kenya', continent:'Africa', type:'adventure', budget:'luxury',
        desc:'Big Five, endless savannas and unforgettable sunsets in the heart of Africa.',
        tags:['Wildlife', 'Photography', 'Nature'], rating:4.9, price:'$3,500–$7,000',
        img:'https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=400&q=80' },
      { name:'Santorini', country:'Greece', continent:'Europe', type:'beach', budget:'moderate',
        desc:'White houses with blue domes, romantic sunsets and excellent local wines.',
        tags:['Romantic', 'Beach', 'Gastronomy'], rating:4.8, price:'$2,000–$3,500',
        img:'https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=400&q=80' },
      { name:'Machu Picchu', country:'Peru', continent:'Americas', type:'adventure', budget:'moderate',
        desc:'The Inca citadel in the Andes Mountains – one of the seven wonders of the world.',
        tags:['History', 'Trekking', 'Adventure'], rating:4.9, price:'$1,500–$3,000',
        img:'https://images.unsplash.com/photo-1587595431973-160d0d94add1?w=400&q=80' },
      { name:'Amsterdam', country:'Netherlands', continent:'Europe', type:'city', budget:'moderate',
        desc:'Picturesque canals, renowned museums, bicycles and legendary tolerance.',
        tags:['Canals', 'Museums', 'Art'], rating:4.6, price:'$1,500–$2,500',
        img:'https://images.unsplash.com/photo-1534351590666-13e3e96b5017?w=400&q=80' },
      { name:'Norway', country:'Norway', continent:'Europe', type:'nature', budget:'luxury',
        desc:'Impressive fjords, northern lights and arctic landscapes of rare beauty.',
        tags:['Fjords', 'Northern Lights', 'Nature'], rating:4.8, price:'$3,000–$5,000',
        img:'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=400&q=80' },
      { name:'Rome', country:'Italy', continent:'Europe', type:'cultural', budget:'moderate',
        desc:'The Eternal City with the Colosseum, Vatican, Trevi Fountain and authentic pasta.',
        tags:['History', 'Gastronomy', 'Art'], rating:4.7, price:'$1,500–$2,500',
        img:'https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=400&q=80' },
      { name:'Maldives', country:'Maldives', continent:'Asia', type:'beach', budget:'luxury',
        desc:'Overwater bungalows, coral reefs and crystal-clear turquoise water.',
        tags:['Snorkeling', 'Relaxation', 'Romantic'], rating:4.9, price:'$4,000–$8,000',
        img:'https://images.unsplash.com/photo-1514282401047-d79a71a590e8?w=400&q=80' }
    ];

    let activeCat = '';

    function setCat(cat, btn) {
      activeCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.className = 'btn btn-outline-secondary btn-sm rounded-pill cat-btn';
      });
      btn.className = 'btn btn-primary btn-sm rounded-pill cat-btn active';
      filterDests();
    }

    function filterDests() {
      const q         = document.getElementById('destSearch').value.toLowerCase();
      const continent = document.getElementById('continentFilter').value;
      const type      = document.getElementById('typeFilter').value || activeCat;
      const budget    = document.getElementById('budgetFilter').value;

      const filtered = DESTINATIONS.filter(d => {
        const matchQ = d.name.toLowerCase().includes(q) || d.country.toLowerCase().includes(q) ||
                       d.desc.toLowerCase().includes(q);
        const matchC = !continent || d.continent === continent;
        const matchT = !type || d.type === type;
        const matchB = !budget || d.budget === budget;
        return matchQ && matchC && matchT && matchB;
      });

      document.getElementById('resultCount').textContent =
        `${filtered.length} destinations found`;

      const grid  = document.getElementById('destGrid');
      const empty = document.getElementById('emptyDest');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('d-none');
      } else {
        empty.classList.add('d-none');
        grid.innerHTML = filtered.map(d => `
          <div class="col-sm-6 col-lg-4">
            <div class="card tp-card h-100">
              <div class="position-relative">
                <img src="${d.img}" class="card-img-top" alt="${d.name}"
                     style="height:200px;object-fit:cover;"
                     onerror="this.src='https://placehold.co/400x200/0d6efd/white?text=${d.name}'" />
                <span class="badge bg-dark bg-opacity-75 position-absolute top-0 end-0 m-2">
                  <i class="bi bi-star-fill text-warning me-1"></i>${d.rating}
                </span>
              </div>
              <div class="card-body d-flex flex-column">
                <div class="d-flex justify-content-between align-items-start mb-1">
                  <h5 class="card-title fw-bold mb-0">${d.name}</h5>
                  <small class="text-muted">${d.continent}</small>
                </div>
                <p class="text-muted small mb-2">
                  <i class="bi bi-geo-alt-fill text-danger me-1"></i>${d.country}
                </p>
                <p class="text-muted small flex-grow-1">${d.desc}</p>
                <div class="d-flex flex-wrap gap-1 mb-3">
                  ${d.tags.map(t => `<span class="badge bg-light text-dark border">${t}</span>`).join('')}
                </div>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="text-success fw-semibold small">${d.price}</span>
                  <a href="new-trip.html?dest=${encodeURIComponent(d.name + ', ' + d.country)}"
                     class="btn btn-primary btn-sm">
                    <i class="bi bi-plus me-1"></i>Plan
                  </a>
                </div>
              </div>
            </div>
          </div>`).join('');
      }
    }

    document.addEventListener('DOMContentLoaded', filterDests);
  </script>
</body>
</html>
