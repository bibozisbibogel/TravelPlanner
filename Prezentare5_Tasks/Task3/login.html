<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – TravelPlanner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Brand -->
      <div class="text-center mb-4">
        <div class="brand-logo mb-2">
          <i class="bi bi-airplane-fill text-primary me-2"></i>TravelPlanner
        </div>
        <h5 class="fw-bold">Welcome back!</h5>
        <p class="text-muted small">Log in to continue planning</p>
        <p class="text-muted" style="font-size:0.75rem;">
          Demo: <code>cristian.stoian@gmail.com</code> / <code>Demo1234!</code><br>
          Admin: <code>admin@travelplanner.com</code> / <code>Admin1234!</code>
        </p>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="loginEmail"
                   placeholder="email@example.com" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold d-flex justify-content-between">
            Password
            <a href="#" class="text-primary small fw-normal">Forgot password</a>
          </label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="loginPass"
                   placeholder="••••••••" required />
            <button type="button" class="btn btn-outline-secondary"
                    onclick="togglePass('loginPass', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" id="rememberMe" checked />
          <label class="form-check-label small" for="rememberMe">Remember me</label>
        </div>

        <div id="loginError" class="alert alert-danger py-2 small d-none">
          <i class="bi bi-exclamation-triangle me-2"></i>Incorrect email or password.
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
          <i class="bi bi-box-arrow-in-right me-2"></i>Log in
        </button>

        <div class="text-center small text-muted">
          Don't have an account?
          <a href="register.html" class="text-primary fw-semibold">Register for free</a>
        </div>
      </form>

      <hr class="my-4" />

      <!-- Social login (decorative) -->
      <div class="d-grid gap-2">
        <button class="btn btn-outline-secondary btn-sm" onclick="socialLogin('Google')">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg"
               width="18" class="me-2" alt="Google" />Continue with Google
        </button>
        <button class="btn btn-outline-secondary btn-sm" onclick="socialLogin('Facebook')">
          <i class="bi bi-facebook text-primary me-2"></i>Continue with Facebook
        </button>
      </div>

      <p class="text-center mt-4 small text-muted mb-0">
        <a href="index.html" class="text-muted">
          <i class="bi bi-arrow-left me-1"></i>Back to home page
        </a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
  <script>
    // If already authenticated, skip the login page
    (function () {
      const stored = localStorage.getItem('tp_user') || sessionStorage.getItem('tp_user');
      if (stored) window.location.href = 'trips.html';
    })();

    async function doLogin(e) {
      e.preventDefault();
      const email  = document.getElementById('loginEmail').value.trim();
      const pass   = document.getElementById('loginPass').value;
      const remember = document.getElementById('rememberMe').checked;
      const btn    = document.getElementById('loginBtn');
      const errEl  = document.getElementById('loginError');

      // Client-side validation
      if (!email || !pass) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.classList.remove('d-none');
        return;
      }

      errEl.classList.add('d-none');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

      try {
        const user = await UsersAPI.login(email, pass, remember);
        setCurrentUser({
          id: user.id,
          name: user.firstName + ' ' + user.lastName,
          email: user.email,
          phone: user.phone,
          preferredCurrency: user.preferredCurrency,
          role: user.role,
          avatarUrl: user.avatarUrl || null
        }, remember);
        window.location.href = 'trips.html';
      } catch (err) {
        errEl.textContent = err.message || 'Incorrect email or password.';
        errEl.classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Log in';
      }
    }

    function togglePass(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
    }

    function socialLogin(provider) {
      alert(`${provider} login – feature available in the full version.`);
    }
  </script>
</body>
</html>
