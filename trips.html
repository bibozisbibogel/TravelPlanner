<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Trips – TravelPlanner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-airplane-fill me-2"></i>TravelPlanner
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="explore.html">Explore</a></li>
          <li class="nav-item"><a class="nav-link" href="trips.html">My Trips</a></li>
          <li class="nav-item"><a class="nav-link" href="budget.html">Budget</a></li>
        </ul>
        <div id="themeToggleWrap" class="d-flex align-items-center"></div>
        <ul class="navbar-nav" id="navUser"></ul>
      </div>
    </div>
  </nav>

  <!-- ===== PAGE HEADER ===== -->
  <div class="page-header">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <h1><i class="bi bi-suitcase-lg me-2"></i>My Trips</h1>
        <p>Manage and track all your adventures</p>
      </div>
      <a href="new-trip.html" class="btn btn-light fw-semibold">
        <i class="bi bi-plus-lg me-2"></i>New Trip
      </a>
    </div>
  </div>

  <main class="container pb-5">

    <!-- ===== FILTERS & SEARCH ===== -->
    <div class="bg-white rounded-3 shadow-sm p-3 mb-4 d-flex flex-wrap gap-3 align-items-center">
      <div class="flex-grow-1">
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input type="text" id="searchInput" class="form-control border-start-0"
                 placeholder="Search by destination or name..." oninput="filterTrips()" />
        </div>
      </div>
      <select id="statusFilter" class="form-select" style="width:auto;" onchange="filterTrips()">
        <option value="">All Statuses</option>
        <option value="draft">Draft</option>
        <option value="planning">Planning</option>
        <option value="confirmed">Confirmed</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select id="sortSelect" class="form-select" style="width:auto;" onchange="filterTrips()">
        <option value="date_desc">Most Recent</option>
        <option value="date_asc">Oldest First</option>
        <option value="name">Alphabetical</option>
      </select>
    </div>

    <!-- ===== TRIPS GRID ===== -->
    <div class="row g-4" id="tripsGrid"></div>

    <!-- ===== EMPTY STATE ===== -->
    <div id="emptyState" class="empty-state d-none">
      <i class="bi bi-suitcase"></i>
      <h4 class="fw-bold mb-2">No trips found</h4>
      <p class="text-muted mb-4">There are no trips matching the selected filters.</p>
      <a href="new-trip.html" class="btn btn-primary">
        <i class="bi bi-plus-lg me-2"></i>Plan Your First Trip
      </a>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="container text-center">
      <p class="small opacity-50 mb-0">
        &copy; 2026 TravelPlanner. PAW Project – University.
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
  <script>
    let TRIPS = [];

    async function loadTrips() {
      const user = getCurrentUser();
      try {
        const data = await TripsAPI.getAll(user.id);
        TRIPS = data.map(t => {
          const spent = (t.expenses || []).reduce((sum, e) => sum + e.amount, 0);
          const dest = t.destination;
          return {
            id: t.id,
            name: t.title,
            destination: dest ? `${dest.name}, ${dest.country}` : 'Unknown',
            startDate: t.startDate,
            endDate: t.endDate,
            status: t.status,
            budget: t.totalBudget || 0,
            spent: spent,
            travelers: t.travelersCount,
            img: dest?.imageUrl || 'https://placehold.co/400x180/0d6efd/white?text=Destination'
          };
        });
      } catch (err) {
        console.warn('API unavailable:', err);
        TRIPS = [];
      }
      filterTrips();
    }

    function buildTripCard(trip) {
      const days = Math.ceil(
        (new Date(trip.endDate) - new Date(trip.startDate)) / (1000 * 60 * 60 * 24)
      );
      const pct = trip.budget > 0 ? Math.min(100, Math.round((trip.spent / trip.budget) * 100)) : 0;
      const badgeColor = { draft:'secondary', planning:'primary', confirmed:'success', completed:'info', cancelled:'danger' }[trip.status] || 'secondary';
      const statusLbl = { draft:'Draft', planning:'Planning', confirmed:'Confirmed', completed:'Completed', cancelled:'Cancelled' }[trip.status] || trip.status;

      return `
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card tp-card h-100">
            <img src="${trip.img}" class="card-img-top" alt="${trip.destination}"
                 style="height:180px;object-fit:cover;" onerror="this.src='https://placehold.co/400x180/0d6efd/white?text=Destination'" />
            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h5 class="card-title fw-bold mb-0">${trip.name}</h5>
                <span class="badge bg-${badgeColor} ms-2">${statusLbl}</span>
              </div>
              <p class="text-muted small mb-2">
                <i class="bi bi-geo-alt-fill me-1 text-danger"></i>${trip.destination}
              </p>
              <div class="d-flex gap-3 text-muted small mb-3">
                <span><i class="bi bi-calendar3 me-1"></i>${formatDate(trip.startDate)}</span>
                <span><i class="bi bi-clock me-1"></i>${days} days</span>
                <span><i class="bi bi-people me-1"></i>${trip.travelers}</span>
              </div>
              <!-- Budget progress -->
              <div class="mb-3">
                <div class="d-flex justify-content-between small mb-1">
                  <span class="text-muted">Budget used</span>
                  <span class="fw-semibold">${pct}%</span>
                </div>
                <div class="budget-bar-wrap">
                  <div class="budget-bar-fill bg-${pct > 90 ? 'danger' : pct > 70 ? 'warning' : 'success'}"
                       style="width:${pct}%"></div>
                </div>
                <div class="d-flex justify-content-between small mt-1 text-muted">
                  <span>${formatCurrency(trip.spent)}</span>
                  <span>${formatCurrency(trip.budget)}</span>
                </div>
              </div>
              <div class="d-flex gap-2 mt-auto">
                <a href="trip-details.html?id=${trip.id}"
                   class="btn btn-outline-primary btn-sm flex-grow-1">
                  <i class="bi bi-eye me-1"></i>View Details
                </a>
                <button class="btn btn-outline-secondary btn-sm" onclick="openEditTrip('${trip.id}')" title="Edit">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteTrip('${trip.id}', '${trip.name.replace(/'/g, "\\'")}')" title="Delete">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
          </div>
        </div>`;
    }

    function filterTrips() {
      const q      = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const sort   = document.getElementById('sortSelect').value;

      let filtered = TRIPS.filter(t => {
        const matchQ = t.name.toLowerCase().includes(q) || t.destination.toLowerCase().includes(q);
        const matchS = !status || t.status === status;
        return matchQ && matchS;
      });

      if (sort === 'date_asc') filtered.sort((a,b) => new Date(a.startDate) - new Date(b.startDate));
      else if (sort === 'date_desc') filtered.sort((a,b) => new Date(b.startDate) - new Date(a.startDate));
      else if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));

      const grid  = document.getElementById('tripsGrid');
      const empty = document.getElementById('emptyState');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('d-none');
      } else {
        grid.innerHTML = filtered.map(buildTripCard).join('');
        empty.classList.add('d-none');
      }
    }

    let DESTINATIONS_LIST = [];
    let editingTripId = null;

    async function openEditTrip(id) {
      const trip = TRIPS.find(t => t.id === id);
      if (!trip) return;
      editingTripId = id;

      if (DESTINATIONS_LIST.length === 0) {
        try { DESTINATIONS_LIST = await DestinationsAPI.getAll(); } catch (_) {}
      }
      const destSelect = document.getElementById('editDestId');
      destSelect.innerHTML = DESTINATIONS_LIST.map(d =>
        `<option value="${d.id}">${d.name}, ${d.country}</option>`
      ).join('');

      const fullTrip = await TripsAPI.getById(id).catch(() => null);
      if (fullTrip) {
        destSelect.value = fullTrip.destinationId || '';
        document.getElementById('editTitle').value = fullTrip.title || '';
        document.getElementById('editStartDate').value = fullTrip.startDate?.split('T')[0] || '';
        document.getElementById('editEndDate').value = fullTrip.endDate?.split('T')[0] || '';
        document.getElementById('editTravelers').value = fullTrip.travelersCount || 1;
        document.getElementById('editBudget').value = fullTrip.totalBudget || '';
        document.getElementById('editStatus').value = fullTrip.status || 'planning';
        document.getElementById('editNotes').value = fullTrip.notes || '';
      } else {
        document.getElementById('editTitle').value = trip.name || '';
        document.getElementById('editStartDate').value = trip.startDate?.split('T')[0] || '';
        document.getElementById('editEndDate').value = trip.endDate?.split('T')[0] || '';
        document.getElementById('editTravelers').value = trip.travelers || 1;
        document.getElementById('editBudget').value = trip.budget || '';
        document.getElementById('editStatus').value = trip.status || 'planning';
        document.getElementById('editNotes').value = '';
      }

      new bootstrap.Modal(document.getElementById('editTripModal')).show();
    }

    async function saveEditTrip() {
      const btn = document.getElementById('saveEditBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving...';
      try {
        await TripsAPI.update(editingTripId, {
          id: editingTripId,
          destinationId: document.getElementById('editDestId').value,
          title: document.getElementById('editTitle').value,
          startDate: document.getElementById('editStartDate').value,
          endDate: document.getElementById('editEndDate').value,
          travelersCount: parseInt(document.getElementById('editTravelers').value) || 1,
          totalBudget: parseFloat(document.getElementById('editBudget').value) || null,
          status: document.getElementById('editStatus').value,
          notes: document.getElementById('editNotes').value || null
        });
        bootstrap.Modal.getInstance(document.getElementById('editTripModal')).hide();
        await loadTrips();
      } catch (err) {
        alert('Failed to update trip: ' + (err.message || JSON.stringify(err)));
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Save Changes';
      }
    }

    async function deleteTrip(id, name) {
      if (!confirm(`Delete trip "${name}"? This cannot be undone.`)) return;
      try {
        await TripsAPI.delete(id);
        await loadTrips();
      } catch (err) {
        alert('Failed to delete trip: ' + (err.message || JSON.stringify(err)));
      }
    }

    document.addEventListener('DOMContentLoaded', loadTrips);
  </script>

  <!-- ===== EDIT TRIP MODAL ===== -->
  <div class="modal fade" id="editTripModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Edit Trip</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Title</label>
              <input type="text" class="form-control" id="editTitle" required />
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Destination</label>
              <select class="form-select" id="editDestId"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Start Date</label>
              <input type="date" class="form-control" id="editStartDate" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">End Date</label>
              <input type="date" class="form-control" id="editEndDate" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Travelers</label>
              <input type="number" class="form-control" id="editTravelers" min="1" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Budget (USD)</label>
              <input type="number" class="form-control" id="editBudget" min="0" />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Status</label>
              <select class="form-select" id="editStatus">
                <option value="draft">Draft</option>
                <option value="planning">Planning</option>
                <option value="confirmed">Confirmed</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Notes</label>
              <textarea class="form-control" id="editNotes" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="saveEditBtn" onclick="saveEditTrip()">
            <i class="bi bi-check-lg me-1"></i>Save Changes
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
